<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Proposal Diagnostics</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:monospace;background:#060e1a;color:#e0e8f0;padding:1.5rem;font-size:13px;line-height:1.6}
h1{color:#C8A84B;font-size:1.1rem;margin-bottom:1.25rem;letter-spacing:0.1em}
.section{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:1rem;margin-bottom:1rem}
.section h2{font-size:0.75rem;letter-spacing:0.14em;text-transform:uppercase;color:#aaa;margin-bottom:0.75rem}
.row{display:flex;align-items:flex-start;gap:0.75rem;margin-bottom:0.4rem;font-size:0.78rem}
.label{color:#8892b0;min-width:240px;flex-shrink:0}
.val{color:#fff;word-break:break-all}
.ok{color:#2ECC71}.warn{color:#f0b429}.err{color:#E74C3C}.dim{color:#555}
.badge{display:inline-block;padding:1px 7px;border-radius:3px;font-size:0.65rem;font-weight:700;letter-spacing:0.06em}
.badge.ok{background:rgba(46,204,113,0.15);color:#2ECC71;border:1px solid rgba(46,204,113,0.3)}
.badge.err{background:rgba(231,76,60,0.15);color:#E74C3C;border:1px solid rgba(231,76,60,0.3)}
.badge.warn{background:rgba(240,180,41,0.15);color:#f0b429;border:1px solid rgba(240,180,41,0.3)}
.log{background:#020810;border:1px solid rgba(0,229,255,0.1);border-radius:4px;padding:0.75rem;
  max-height:220px;overflow-y:auto;font-size:0.72rem;color:#8892b0}
.log .e{color:#E74C3C}.log .w{color:#f0b429}.log .i{color:#4af}
button{background:rgba(200,168,75,0.12);border:1px solid rgba(200,168,75,0.3);color:#C8A84B;
  padding:0.4rem 1rem;border-radius:4px;cursor:pointer;font-family:monospace;font-size:0.78rem;margin-right:0.5rem;margin-bottom:0.5rem}
button:hover{background:rgba(200,168,75,0.22)}
#iframe-wrap{width:100%;height:400px;border:1px solid rgba(0,229,255,0.15);border-radius:6px;overflow:hidden;margin-top:0.75rem}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<h1>⚡ PROPOSE.HTML DIAGNOSTIC</h1>

<div class="section">
  <h2>URL Parameters (current test)</h2>
  <div id="param-display"></div>
  <div style="margin-top:0.75rem;display:flex;flex-wrap:wrap;gap:0.4rem">
    <button onclick="loadTest('minimal')">Minimal URL</button>
    <button onclick="loadTest('full')">Full URL</button>
    <button onclick="loadTest('nobill')">No Bill</button>
    <button onclick="loadTest('expired')">Expired</button>
    <button onclick="window.open(currentURL,'_blank')">Open in new tab ↗</button>
  </div>
</div>

<div class="section">
  <h2>Element Checks</h2>
  <div id="elem-checks"></div>
</div>

<div class="section">
  <h2>DATA Object</h2>
  <div id="data-display"></div>
</div>

<div class="section">
  <h2>Runtime Console</h2>
  <div class="log" id="console-log"></div>
</div>

<div class="section">
  <h2>Live Preview</h2>
  <div id="iframe-wrap">
    <iframe id="preview" src="about:blank"></iframe>
  </div>
</div>

<script>
var currentURL = '';
var log = document.getElementById('console-log');

function addLog(type, msg){
  var d = document.createElement('div');
  d.className = type;
  d.textContent = '[' + type.toUpperCase() + '] ' + msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

// Intercept iframe console errors
function setupIframeMonitor(iframe){
  iframe.addEventListener('load', function(){
    try {
      var win = iframe.contentWindow;
      if(!win) return;

      // Patch console
      ['log','warn','error','info'].forEach(function(m){
        var orig = win.console[m].bind(win.console);
        win.console[m] = function(){
          var args = Array.prototype.slice.call(arguments);
          var msg = args.map(function(a){
            if(typeof a === 'object') try{return JSON.stringify(a)}catch(e){return String(a);}
            return String(a);
          }).join(' ');
          addLog(m==='error'?'e':m==='warn'?'w':'i', msg);
          orig.apply(win.console, arguments);
        };
      });

      // Check loading screen after 2s
      setTimeout(function(){
        try {
          var ls = win.document.getElementById('loading-screen');
          var mc = win.document.getElementById('main-content');
          var lsVis = ls ? ls.style.display !== 'none' && getComputedStyle(ls).display !== 'none' : false;
          var mcVis = mc ? mc.style.display !== 'none' : false;

          updateElementChecks(win);
          updateDataDisplay(win);

          if(lsVis){
            addLog('e', 'STUCK: loading-screen still visible after 2s');
          } else if(mcVis){
            addLog('i', 'SUCCESS: main-content is visible');
          } else {
            addLog('w', 'Neither loading-screen nor main-content visible?');
          }
        } catch(e){
          addLog('e', 'Check failed: ' + e.message);
        }
      }, 2000);

    } catch(e){
      addLog('e', 'Cannot access iframe: ' + e.message + ' (CORS or load error)');
    }
  });
}

function updateElementChecks(win){
  var ids = ['loading-screen','main-content','expired-screen',
             'hero-name','ov-bill','ov-total','ov-usage',
             'propChart','rate-select','milestones',
             'solar-canvas','prop-ig-feed','solar-benefits-list'];
  var out = '';
  ids.forEach(function(id){
    var el = win.document.getElementById(id);
    var status, badge;
    if(!el){ badge='err'; status='NOT FOUND'; }
    else {
      var disp = win.getComputedStyle(el).display;
      if(disp==='none'){ badge='warn'; status='hidden (display:none)'; }
      else { badge='ok'; status='visible — ' + (el.textContent||'').trim().slice(0,40); }
    }
    out += '<div class="row"><span class="label">#'+id+'</span><span class="badge '+badge+'">'+badge.toUpperCase()+'</span><span class="val dim" style="margin-left:8px">'+status+'</span></div>';
  });
  document.getElementById('elem-checks').innerHTML = out;
}

function updateDataDisplay(win){
  var out = '';
  try {
    var DATA = win.DATA;
    if(!DATA){ out='<span class="err">DATA not found on window</span>'; }
    else {
      ['name','utility','bill','kwh','solar','solarKwh','vppRate','term','battery','rep','company','created'].forEach(function(k){
        var v = DATA[k];
        var badge = (!v && v!==0)?'warn':'ok';
        out += '<div class="row"><span class="label">DATA.'+k+'</span><span class="badge '+badge+'">'+badge.toUpperCase()+'</span><span class="val" style="margin-left:8px">'+JSON.stringify(v)+'</span></div>';
      });
    }
  } catch(e){ out = '<span class="err">'+e.message+'</span>'; }
  document.getElementById('data-display').innerHTML = out;
}

var TEST_URLS = {
  minimal: 'propose.html?n=Test+Family&u=SDG%26E&b=187&k=4200&s=202&sk=6800&v=0.0299&t=25&r=David+West&ts=' + Date.now(),
  full:    'propose.html?n=Johnson+Family&u=SDG%26E&b=187&k=4200&s=202&sk=6800&v=0.0299&t=25&bat=Tesla+Powerwall+3&r=David+West&co=Kinhome&plan=PPA&ts=' + Date.now(),
  nobill:  'propose.html?n=No+Bill+Family&u=SDG%26E&b=0&k=0&s=0&sk=0&v=0.0299&t=25&ts=' + Date.now(),
  expired: 'propose.html?n=Test&u=SDG%26E&b=187&k=4200&s=202&sk=6800&v=0.0299&t=25&ts=1000000'
};

function loadTest(type){
  var url = TEST_URLS[type];
  currentURL = url;

  // Show params
  var params = new URLSearchParams(url.split('?')[1]);
  var out = '';
  params.forEach(function(v,k){ out += '<div class="row"><span class="label">?'+k+'</span><span class="val">'+v+'</span></div>'; });
  document.getElementById('param-display').innerHTML = out;

  // Clear log
  log.innerHTML = '';
  addLog('i', 'Loading: ' + type + ' — ' + url.slice(0,80));

  // Load iframe
  var iframe = document.getElementById('preview');
  setupIframeMonitor(iframe);
  iframe.src = url;
}

// Auto-load minimal on start
loadTest('full');
</script>
</body>
</html>
