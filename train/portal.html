<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Training | Your Energy Best</title>
  <link rel="icon" type="image/png" href="../img/logo.png" />
  <link rel="stylesheet" href="../style.css" />
  <style>
    :root { --train-accent: #f59e0b; --train-accent-light: rgba(245,158,11,0.1); --train-locked: #94a3b8; }

    /* ─── Password Gate ─── */
    .gate { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--navy) 0%, #0f3443 100%); padding: 2rem; }
    .gate__box { background: var(--white); border-radius: 16px; padding: 3rem; max-width: 420px; width: 100%; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .gate__box img { height: 50px; margin-bottom: 1.5rem; }
    .gate__box h2 { color: var(--navy); margin-bottom: 0.5rem; font-size: 1.5rem; }
    .gate__box p { color: var(--slate); margin-bottom: 1.5rem; font-size: 0.9rem; }
    .gate__input { width: 100%; padding: 0.75rem 1rem; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 1rem; font-family: inherit; text-align: center; margin-bottom: 1rem; }
    .gate__input:focus { outline: none; border-color: var(--teal); }
    .gate__input.error { border-color: #ef4444; animation: shake 0.3s; }
    .gate__btn { width: 100%; padding: 0.75rem; background: var(--teal); color: var(--white); border: none; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: inherit; transition: all 0.3s; }
    .gate__btn:hover { background: var(--teal-dark, #1a9ba8); }
    .gate__request { margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--gray-200); }
    .gate__request p { font-size: 0.85rem; margin-bottom: 0.75rem; }
    .gate__request a { color: var(--teal); font-weight: 600; cursor: pointer; text-decoration: underline; }

    /* ─── Training Dashboard ─── */
    .train-dashboard { display: none; }
    .train-dashboard.visible { display: block; }
    .train-header { background: linear-gradient(135deg, var(--navy) 0%, #0f3443 100%); padding: 3rem 2rem 2rem; color: var(--white); }
    .train-header__inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .train-header h1 { font-size: 1.8rem; }
    .train-header__logo { height: 40px; }
    .train-header__logout { color: rgba(255,255,255,0.6); font-size: 0.85rem; cursor: pointer; background: none; border: 1px solid rgba(255,255,255,0.2); padding: 0.4rem 1rem; border-radius: 50px; transition: all 0.3s; }
    .train-header__logout:hover { color: var(--white); border-color: var(--white); }

    .train-progress-bar { background: var(--navy); padding: 0 2rem 2rem; }
    .train-progress-bar__inner { max-width: 900px; margin: 0 auto; }
    .train-progress-bar__track { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .train-progress-bar__fill { height: 100%; background: var(--train-accent); border-radius: 4px; transition: width 0.5s ease; }
    .train-progress-bar__text { color: rgba(255,255,255,0.5); font-size: 0.8rem; margin-top: 0.5rem; }

    /* ─── Level Grid ─── */
    .train-levels { padding: 3rem 2rem; max-width: 900px; margin: 0 auto; }
    .level-card { display: flex; align-items: center; gap: 1.25rem; padding: 1.25rem 1.5rem; border-radius: 12px; margin-bottom: 1rem; border: 2px solid var(--gray-200); background: var(--white); transition: all 0.3s; cursor: pointer; }
    .level-card:hover { border-color: var(--teal); transform: translateX(4px); }
    .level-card.locked { opacity: 0.5; cursor: not-allowed; }
    .level-card.locked:hover { border-color: var(--gray-200); transform: none; }
    .level-card.active { border-color: var(--train-accent); background: var(--train-accent-light); }
    .level-card.completed { border-color: var(--teal); }
    .level-card__num {
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 1rem; flex-shrink: 0;
      background: var(--gray-100); color: var(--slate); border: 2px solid var(--gray-200);
    }
    .level-card.completed .level-card__num { background: var(--teal); color: var(--white); border-color: var(--teal); }
    .level-card.active .level-card__num { background: var(--train-accent); color: var(--white); border-color: var(--train-accent); }
    .level-card.locked .level-card__num { background: var(--gray-100); color: var(--train-locked); }
    .level-card__info { flex: 1; }
    .level-card__title { font-weight: 700; color: var(--navy); margin-bottom: 0.2rem; }
    .level-card.locked .level-card__title { color: var(--train-locked); }
    .level-card__desc { font-size: 0.85rem; color: var(--slate); }
    .level-card__status { font-size: 0.8rem; font-weight: 600; flex-shrink: 0; }
    .level-card.completed .level-card__status { color: var(--teal); }
    .level-card.active .level-card__status { color: var(--train-accent); }
    .level-card.locked .level-card__status { color: var(--train-locked); }

    /* ─── Level Content View ─── */
    .level-content { display: none; padding: 2rem; max-width: 900px; margin: 0 auto; }
    .level-content.visible { display: block; animation: fadeIn 0.3s ease; }
    .level-content__back { background: none; border: none; color: var(--teal); font-weight: 600; cursor: pointer; font-size: 0.95rem; padding: 0; margin-bottom: 1.5rem; font-family: inherit; }
    .level-content__back:hover { text-decoration: underline; }
    .level-content__header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid var(--gray-200); }
    .level-content__header h2 { color: var(--navy); margin-bottom: 0.5rem; }
    .level-content__header p { color: var(--slate); }
    .level-content__body { line-height: 1.8; color: var(--navy); }
    .level-content__body h3 { margin-top: 2rem; margin-bottom: 0.75rem; color: var(--navy); }
    .level-content__body p { margin-bottom: 1rem; }
    .level-content__body ul, .level-content__body ol { margin-bottom: 1rem; padding-left: 1.5rem; }
    .level-content__body li { margin-bottom: 0.5rem; }
    .level-content__body blockquote { border-left: 3px solid var(--teal); padding: 1rem 1.5rem; background: var(--gray-100); border-radius: 0 8px 8px 0; margin: 1.5rem 0; }
    .level-content__complete { margin-top: 2rem; padding-top: 2rem; border-top: 2px solid var(--gray-200); text-align: center; }
    .level-content__complete-btn { padding: 0.75rem 2rem; background: var(--teal); color: var(--white); border: none; border-radius: 50px; font-weight: 700; font-size: 1rem; cursor: pointer; font-family: inherit; transition: all 0.3s; }
    .level-content__complete-btn:hover { background: var(--teal-dark, #1a9ba8); transform: translateY(-2px); }

    /* ─── Request Access Modal ─── */
    .request-modal { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; padding: 1rem; }
    .request-modal.visible { display: flex; }
    .request-modal__box { background: var(--white); border-radius: 16px; padding: 2.5rem; max-width: 440px; width: 100%; position: relative; }
    .request-modal__close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--slate); }
    .request-modal__box h3 { color: var(--navy); margin-bottom: 0.5rem; }
    .request-modal__box > p { color: var(--slate); font-size: 0.9rem; margin-bottom: 1.25rem; }
    .request-modal__box .form-field { margin-bottom: 1rem; }
    .request-modal__box .form-field label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.3rem; color: var(--navy); }
    .request-modal__box .form-field input { width: 100%; padding: 0.6rem 0.75rem; border: 2px solid var(--gray-200); border-radius: 8px; font-size: 0.95rem; font-family: inherit; }
    .request-modal__box .form-field input:focus { outline: none; border-color: var(--teal); }
    .request-modal__submit { width: 100%; padding: 0.75rem; background: var(--teal); color: var(--white); border: none; border-radius: 50px; font-weight: 700; cursor: pointer; font-family: inherit; }
    .request-modal__success { display: none; text-align: center; }
    .request-modal__success p { color: var(--teal); font-weight: 700; font-size: 1.1rem; }

    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes shake { 0%,100% { transform:translateX(0); } 25% { transform:translateX(-6px); } 75% { transform:translateX(6px); } }
    @media (max-width: 680px) {
      .train-header__inner { flex-direction: column; gap: 1rem; text-align: center; }
      .level-card { flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════ -->
<!-- PASSWORD GATE                          -->
<!-- ═══════════════════════════════════════ -->
<div class="gate" id="gate">
  <div class="gate__box">
    <img src="../img/logo.png" alt="Your Energy Best" />
    <h2>Training Portal</h2>
    <p>Enter your access code to continue.</p>
    <input type="password" class="gate__input" id="gateInput" placeholder="Access Code" autofocus />
    <button class="gate__btn" id="gateBtn">Enter</button>
    <div class="gate__request">
      <p>Don't have access? <a id="requestAccessLink">Request Access</a></p>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!-- TRAINING DASHBOARD                     -->
<!-- ═══════════════════════════════════════ -->
<div class="train-dashboard" id="dashboard">

  <div class="train-header">
    <div class="train-header__inner">
      <div>
        <h1>Training Portal</h1>
      </div>
      <div style="display:flex;align-items:center;gap:1rem;">
        <img src="../img/logo.png" alt="YEB" class="train-header__logo" />
        <button class="train-header__logout" id="logoutBtn">Log Out</button>
      </div>
    </div>
  </div>

  <div class="train-progress-bar">
    <div class="train-progress-bar__inner">
      <div class="train-progress-bar__track">
        <div class="train-progress-bar__fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="train-progress-bar__text" id="progressText">0 of 10 levels completed</div>
    </div>
  </div>

  <!-- Level List -->
  <div class="train-levels" id="levelList"></div>

  <!-- Level Content -->
  <div class="level-content" id="levelContent">
    <button class="level-content__back" id="backToLevels">← Back to all levels</button>
    <div class="level-content__header">
      <h2 id="lcTitle"></h2>
      <p id="lcDesc"></p>
    </div>
    <div class="level-content__body" id="lcBody"></div>
    <div class="level-content__complete">
      <button class="level-content__complete-btn" id="completeBtn">Mark as Complete →</button>
    </div>
  </div>

</div>

<!-- ═══════════════════════════════════════ -->
<!-- REQUEST ACCESS MODAL                   -->
<!-- ═══════════════════════════════════════ -->
<div class="request-modal" id="requestModal">
  <div class="request-modal__box">
    <button class="request-modal__close" id="requestClose">✕</button>
    <h3>Request Training Access</h3>
    <p>Fill out the form below and we'll get back to you.</p>
    <form id="requestForm">
      <div class="form-field"><label for="rName">Full Name *</label><input type="text" id="rName" required /></div>
      <div class="form-field"><label for="rEmail">Email *</label><input type="email" id="rEmail" required /></div>
      <div class="form-field"><label for="rPhone">Phone</label><input type="tel" id="rPhone" /></div>
      <button type="submit" class="request-modal__submit">Submit Request</button>
    </form>
    <div class="request-modal__success" id="requestSuccess">
      <p>✓ Request submitted! We'll be in touch soon.</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// TRAINING SYSTEM
// ═══════════════════════════════════════════════════════════

const PASS = 'Become';
const STORAGE_KEY = 'yeb_train_auth';
const PROGRESS_KEY = 'yeb_train_progress';

// ─── Level Data (10 levels) ───
// Content can be replaced by loading from a JSON file later
const levels = [
  { id: 1, title: 'Welcome & Overview', desc: 'Introduction to Your Energy Best and our mission.', content: `
    <h3>Welcome to Your Energy Best Training</h3>
    <p>Congratulations on joining the team. This training portal will guide you through everything you need to know to succeed.</p>
    <p>Each level builds on the previous one. Complete them in order to unlock your full potential.</p>
    <blockquote>Our mission: Make solar accessible, honest, and hassle-free for every homeowner.</blockquote>
    <h3>What You'll Learn</h3>
    <ul>
      <li>How the solar industry works in California</li>
      <li>Our products, services, and value proposition</li>
      <li>The sales process from lead to close</li>
      <li>How to handle objections</li>
      <li>Advanced closing techniques</li>
    </ul>
    <p>Ready? Mark this level complete and move on to Level 2.</p>
  `},
  { id: 2, title: 'Solar Industry Basics', desc: 'How solar works, net metering, and the California market.', content: `
    <h3>Solar Industry Fundamentals</h3>
    <p>Content coming soon — paste your training notes here.</p>
    <blockquote>Tip: You can edit the content for each level in the training configuration file.</blockquote>
  `},
  { id: 3, title: 'Our Products & Services', desc: 'Panels, batteries, inverters, and service plans.', content: `
    <h3>Products & Services</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 4, title: 'The Customer Journey', desc: 'From first contact to installation and beyond.', content: `
    <h3>The Customer Journey</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 5, title: 'Lead Generation & Qualification', desc: 'Finding and qualifying the right prospects.', content: `
    <h3>Lead Generation & Qualification</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 6, title: 'The Consultation', desc: 'Running an effective solar consultation.', content: `
    <h3>The Consultation</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 7, title: 'Handling Objections', desc: 'Common objections and how to address them.', content: `
    <h3>Handling Objections</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 8, title: 'Closing Techniques', desc: 'How to confidently close the deal.', content: `
    <h3>Closing Techniques</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 9, title: 'Post-Sale & Referrals', desc: 'Delivering a great experience and generating referrals.', content: `
    <h3>Post-Sale & Referrals</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
  { id: 10, title: 'Advanced Mastery', desc: 'Leadership, scaling, and becoming an expert.', content: `
    <h3>Advanced Mastery</h3>
    <p>Content coming soon — paste your training notes here.</p>
  `},
];

// ─── State ───
let completedLevels = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '[]');
let currentLevel = null;

// ─── Password Gate ───
function checkAuth() {
  return sessionStorage.getItem(STORAGE_KEY) === 'true';
}

function showDashboard() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('dashboard').classList.add('visible');
  renderLevels();
}

document.getElementById('gateBtn').addEventListener('click', tryLogin);
document.getElementById('gateInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

function tryLogin() {
  const input = document.getElementById('gateInput');
  if (input.value === PASS) {
    sessionStorage.setItem(STORAGE_KEY, 'true');
    showDashboard();
  } else {
    input.classList.add('error');
    input.value = '';
    input.placeholder = 'Incorrect — try again';
    setTimeout(() => input.classList.remove('error'), 400);
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  sessionStorage.removeItem(STORAGE_KEY);
  location.reload();
});

// Auto-login if already authenticated this session
if (checkAuth()) showDashboard();

// ─── Render Levels ───
function renderLevels() {
  const list = document.getElementById('levelList');
  // Determine highest unlocked level (completed + 1, or 1)
  const maxUnlocked = Math.max(...completedLevels, 0) + 1;

  list.innerHTML = levels.map(lv => {
    const isCompleted = completedLevels.includes(lv.id);
    const isActive = lv.id === maxUnlocked && !isCompleted;
    const isLocked = lv.id > maxUnlocked;
    const cls = isCompleted ? 'completed' : isActive ? 'active' : isLocked ? 'locked' : '';
    const status = isCompleted ? '✓ Complete' : isActive ? 'In Progress' : isLocked ? '🔒 Locked' : 'Available';

    return `<div class="level-card ${cls}" data-id="${lv.id}" ${isLocked ? '' : 'onclick="openLevel(' + lv.id + ')"'}>
      <div class="level-card__num">${lv.id}</div>
      <div class="level-card__info">
        <div class="level-card__title">${isLocked ? 'Level ' + lv.id : lv.title}</div>
        <div class="level-card__desc">${isLocked ? 'Complete previous levels to unlock.' : lv.desc}</div>
      </div>
      <div class="level-card__status">${status}</div>
    </div>`;
  }).join('');

  // Update progress bar
  const pct = (completedLevels.length / levels.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = completedLevels.length + ' of ' + levels.length + ' levels completed';
}

// ─── Open Level ───
function openLevel(id) {
  const lv = levels.find(l => l.id === id);
  if (!lv) return;
  currentLevel = id;

  document.getElementById('levelList').style.display = 'none';
  const content = document.getElementById('levelContent');
  content.classList.add('visible');
  document.getElementById('lcTitle').textContent = 'Level ' + lv.id + ': ' + lv.title;
  document.getElementById('lcDesc').textContent = lv.desc;
  document.getElementById('lcBody').innerHTML = lv.content;

  const btn = document.getElementById('completeBtn');
  if (completedLevels.includes(id)) {
    btn.textContent = '✓ Completed';
    btn.disabled = true;
    btn.style.background = 'var(--slate)';
  } else {
    btn.textContent = 'Mark as Complete →';
    btn.disabled = false;
    btn.style.background = '';
  }

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── Back to Levels ───
document.getElementById('backToLevels').addEventListener('click', () => {
  document.getElementById('levelContent').classList.remove('visible');
  document.getElementById('levelList').style.display = 'block';
  renderLevels();
});

// ─── Complete Level ───
document.getElementById('completeBtn').addEventListener('click', () => {
  if (currentLevel && !completedLevels.includes(currentLevel)) {
    completedLevels.push(currentLevel);
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(completedLevels));

    const btn = document.getElementById('completeBtn');
    btn.textContent = '✓ Completed!';
    btn.disabled = true;
    btn.style.background = 'var(--slate)';

    // Auto-advance after short delay
    setTimeout(() => {
      document.getElementById('levelContent').classList.remove('visible');
      document.getElementById('levelList').style.display = 'block';
      renderLevels();

      // Auto-open next level if available
      const next = currentLevel + 1;
      if (next <= levels.length) {
        setTimeout(() => openLevel(next), 300);
      }
    }, 800);
  }
});

// ─── Request Access Modal ───
document.getElementById('requestAccessLink').addEventListener('click', () => {
  document.getElementById('requestModal').classList.add('visible');
});
document.getElementById('requestClose').addEventListener('click', () => {
  document.getElementById('requestModal').classList.remove('visible');
});
document.getElementById('requestModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('requestModal')) document.getElementById('requestModal').classList.remove('visible');
});

document.getElementById('requestForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button');
  btn.textContent = 'Submitting...';
  btn.disabled = true;

  const name = document.getElementById('rName').value.trim();
  const nameParts = name.split(' ');
  const firstName = nameParts[0] || 'Unknown';
  const lastName = nameParts.slice(1).join(' ') || 'N/A';

  try {
    await fetch('../zoho.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'recruit',
        source_form: 'TrainingAccessRequest',
        first_name: firstName,
        last_name: lastName,
        email: document.getElementById('rEmail').value.trim(),
        phone: document.getElementById('rPhone').value.trim(),
      })
    });
  } catch(err) {}

  document.getElementById('requestForm').style.display = 'none';
  document.getElementById('requestSuccess').style.display = 'block';
  setTimeout(() => { document.getElementById('requestModal').classList.remove('visible'); }, 2500);
});
</script>
</body>
</html>
